<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경기북과학고 맞춤형 성적 도우미</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            /* 순정 화이트 테마 색상표 */
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --input-bg: #f9fafb;
            
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --primary-text: #1e3a8a;
            
            --radius-card: 24px;
            --radius-element: 12px;
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 탭 네비게이션 */
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 16px;
            box-shadow: var(--shadow-card);
            overflow-x: auto;
        }

        .nav-tab {
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: transparent;
            font-size: 15px;
            white-space: nowrap;
        }

        .nav-tab:hover {
            background: var(--input-bg);
            color: var(--text-main);
        }

        .nav-tab.active {
            background: var(--primary-light);
            color: var(--primary-text);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 대시보드 카드 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-card);
            padding: 24px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-main);
        }

        .card-value span {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* 리스트형 과목 입력 섹션 */
        .list-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-element);
            transition: all 0.2s;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .item-row:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08);
            transform: translateY(-1px);
        }

        .flex-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-inline {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            outline: none;
            transition: 0.2s;
        }

        .input-inline:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .name-input { width: 120px; }
        .credit-input { width: 70px; text-align: center; }
        .unit-label { font-size: 14px; color: var(--text-muted); font-weight: 600; margin-left: -4px;}

        .grade-select {
            padding: 10px 32px 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            transition: 0.2s;
        }

        .grade-select:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-add {
            width: 100%;
            background-color: transparent;
            color: var(--text-muted);
            border: 2px dashed var(--border-color);
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: var(--radius-element);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .btn-add:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: var(--primary-light);
        }

        .btn-delete {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            border-radius: 8px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete:hover {
            color: var(--danger);
            background-color: #fee2e2;
        }

        /* 툴 레이아웃 (표준편차, 예상점수 등) */
        .tool-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
        }

        .tool-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-right: 1px solid var(--border-color);
            padding-right: 24px;
        }

        .tool-result-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .tool-result-value {
            font-size: 40px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border-radius: var(--radius-element);
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .form-control:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px var(--primary-light); }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: var(--radius-element);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .error-text { color: var(--danger); font-size: 16px; font-weight: 600; }

        @media (max-width: 600px) {
            .item-row { flex-direction: column; align-items: stretch; gap: 16px; }
            .flex-group { justify-content: space-between; }
            .name-input { flex: 1; }
            .tool-container { grid-template-columns: 1fr; }
            .tool-form { border-right: none; padding-right: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('tab-1', this)">성적 관리</button>
        <button class="nav-tab" onclick="switchTab('tab-2', this)">표준편차 역산</button>
        <button class="nav-tab" onclick="switchTab('tab-3', this)">목표 점수</button>
        <button class="nav-tab" onclick="switchTab('tab-4', this)">예상 등수</button>
    </div>

    <div id="tab-1" class="tab-content active">
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-title">5등급제 평균 (총 <span id="total-credits">0</span>단위)</div>
                <div class="card-value" id="grade-5">0.00<span>등급</span></div>
            </div>
            <div class="card">
                <div class="card-title">9등급제 환산 추정치 (교육청 통계 기반)</div>
                <div class="card-value" id="grade-9" style="color: var(--primary);">0.00<span>등급</span></div>
            </div>
        </div>

        <div class="list-group" id="subjectList">
            </div>
        
        <button class="btn-add" onclick="addSubject()">+ 과목 추가하기</button>
    </div>

    <div id="tab-2" class="tab-content">
        <div class="tool-container">
            <div class="tool-form">
                <div class="input-group"><label>내 원점수</label><input type="number" id="sd_raw" class="form-control" placeholder="예: 85"></div>
                <div class="input-group"><label>과목 평균</label><input type="number" id="sd_mean" class="form-control" placeholder="예: 62.5"></div>
                <div class="input-group"><label>T점수 (표준점수)</label><input type="number" id="sd_t" class="form-control" placeholder="예: 65"></div>
                <button class="btn-primary" onclick="calculateSD()">계산하기</button>
            </div>
            <div class="tool-result-area">
                <div class="card-title">예측된 과목 표준편차</div>
                <div class="tool-result-value" id="sdResult">-</div>
            </div>
        </div>
    </div>

    <div id="tab-3" class="tab-content">
        <div class="tool-container">
            <div class="tool-form">
                <div class="input-group"><label>학년 총 인원</label><input type="number" id="score_total" class="form-control" value="100"></div>
                <div class="input-group"><label>목표 등수</label><input type="number" id="score_rank" class="form-control" placeholder="예: 15"></div>
                <div class="input-group"><label>과목 평균</label><input type="number" id="score_mean" class="form-control" placeholder="예: 70"></div>
                <div class="input-group"><label>표준편차</label><input type="number" id="score_sd" class="form-control" placeholder="예: 15"></div>
                <button class="btn-primary" onclick="calculateExpectedScore()">계산하기</button>
            </div>
            <div class="tool-result-area">
                <div class="card-title">필요한 원점수</div>
                <div class="tool-result-value" id="scoreResult">-</div>
            </div>
        </div>
    </div>

    <div id="tab-4" class="tab-content">
        <div class="tool-container">
            <div class="tool-form">
                <div class="input-group"><label>학년 총 인원</label><input type="number" id="rank_total" class="form-control" value="100"></div>
                <div class="input-group"><label>내 원점수</label><input type="number" id="rank_score" class="form-control" placeholder="예: 88"></div>
                <div class="input-group"><label>과목 평균</label><input type="number" id="rank_mean" class="form-control" placeholder="예: 70"></div>
                <div class="input-group"><label>표준편차</label><input type="number" id="rank_sd" class="form-control" placeholder="예: 15"></div>
                <button class="btn-primary" onclick="calculateExpectedRank()">계산하기</button>
            </div>
            <div class="tool-result-area">
                <div class="card-title">나의 예상 위치</div>
                <div class="tool-result-value" id="rankResult">-</div>
            </div>
        </div>
    </div>

</div>

<script>
    // 탭 전환
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    // 통계 함수
    function normalCDF(z) {
        let t = 1 / (1 + 0.2316419 * Math.abs(z));
        let d = 0.3989423 * Math.exp(-z * z / 2);
        let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
        return z > 0 ? 1 - p : p;
    }

    function inverseNormalCDF(p) {
        if (p <= 0) return -4; if (p >= 1) return 4;
        let sign = (p < 0.5) ? -1 : 1;
        p = (p < 0.5) ? p : 1 - p;
        let t = Math.sqrt(-2.0 * Math.log(p));
        let num = 2.515517 + t * (0.802853 + t * 0.010328);
        let den = 1.0 + t * (1.432788 + t * (0.189269 + t * 0.001308));
        return sign * (t - num / den);
    }

    // 과목 데이터 (기본 9과목 세팅 유지)
    let subjectsData = [
        { id: 1, name: '수학', credit: 6, grade: 1 },
        { id: 2, name: '물리', credit: 3, grade: 1 },
        { id: 3, name: '화학', credit: 2, grade: 1 },
        { id: 4, name: '생명', credit: 3, grade: 1 },
        { id: 5, name: '지학', credit: 3, grade: 1 },
        { id: 6, name: '정보', credit: 2, grade: 1 },
        { id: 7, name: '영어', credit: 3, grade: 1 },
        { id: 8, name: '중국어', credit: 3, grade: 1 },
        { id: 9, name: '한국사', credit: 3, grade: 1 }
    ];

    // 부산교육청 9등급제 추정
    function estimate9TierGrade(grade5) {
        const map = [
            {g5: 1.00, g9: 1.64}, {g5: 1.16, g9: 1.81}, {g5: 1.33, g9: 2.18}, {g5: 1.50, g9: 2.48}, 
            {g5: 1.66, g9: 2.76}, {g5: 1.83, g9: 3.07}, {g5: 2.00, g9: 3.44}, {g5: 2.16, g9: 3.61}, 
            {g5: 2.33, g9: 3.94}, {g5: 2.50, g9: 4.22}, {g5: 2.66, g9: 4.47}, {g5: 2.83, g9: 4.76},
            {g5: 3.00, g9: 5.08}, {g5: 3.16, g9: 5.25}, {g5: 3.33, g9: 5.55}, {g5: 3.50, g9: 5.83}, 
            {g5: 3.66, g9: 6.05}, {g5: 3.83, g9: 6.35}, {g5: 4.00, g9: 6.69}, {g5: 4.16, g9: 6.84}, 
            {g5: 4.33, g9: 7.14}, {g5: 4.50, g9: 7.40}, {g5: 4.66, g9: 7.63}, {g5: 4.83, g9: 7.97}, {g5: 5.00, g9: 9.00}
        ];
        if (grade5 <= 1.00) return 1.64; if (grade5 >= 5.00) return 9.00;
        for (let i=0; i<map.length-1; i++) {
            if (grade5 >= map[i].g5 && grade5 <= map[i+1].g5) {
                let r = (grade5 - map[i].g5) / (map[i+1].g5 - map[i].g5);
                return map[i].g9 + r * (map[i+1].g9 - map[i].g9);
            }
        }
        return 9.00;
    }

    // 실시간 성적 계산
    function calculateRealTime() {
        let sumScore = 0, sumCredit = 0;
        subjectsData.forEach(sub => { sumScore += sub.grade * sub.credit; sumCredit += sub.credit; });
        document.getElementById('total-credits').innerText = sumCredit;
        
        if(sumCredit === 0) {
            document.getElementById('grade-5').innerHTML = '0.00<span>등급</span>';
            document.getElementById('grade-9').innerHTML = '0.00<span>등급</span>';
            return;
        }
        const avg = sumScore / sumCredit;
        document.getElementById('grade-5').innerHTML = avg.toFixed(2) + '<span>등급</span>';
        document.getElementById('grade-9').innerHTML = estimate9TierGrade(avg).toFixed(2) + '<span>등급</span>';
    }

    // 리스트형으로 과목 UI 렌더링
    function renderSubjects() {
        const container = document.getElementById('subjectList');
        container.innerHTML = '';
        
        subjectsData.forEach((sub, i) => {
            let options = [1,2,3,4,5].map(v => `<option value="${v}" ${sub.grade == v ? 'selected' : ''}>${v}등급</option>`).join('');
            
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <div class="flex-group">
                    <input type="text" class="input-inline name-input" value="${sub.name}" oninput="updateData(${i}, 'name', this.value)" placeholder="과목명">
                    <input type="number" class="input-inline credit-input" value="${sub.credit}" min="1" oninput="updateData(${i}, 'credit', this.value)">
                    <span class="unit-label">단위</span>
                </div>
                <div class="flex-group">
                    <select class="grade-select" onchange="updateData(${i}, 'grade', this.value)">
                        ${options}
                    </select>
                    <button class="btn-delete" onclick="deleteSubject(${i})" title="삭제">✕</button>
                </div>
            `;
            container.appendChild(row);
        });

        calculateRealTime();
    }

    // 데이터 갱신
    function updateData(index, field, value) {
        if (field === 'credit' || field === 'grade') {
            subjectsData[index][field] = parseInt(value) || 0;
        } else {
            subjectsData[index][field] = value;
        }
        calculateRealTime();
    }

    function addSubject() { subjectsData.push({ id: Date.now(), name: '새 과목', credit: 3, grade: 1 }); renderSubjects(); }
    function deleteSubject(index) { subjectsData.splice(index, 1); renderSubjects(); }

    // 부가 툴 1: 표준편차 역산
    function calculateSD() {
        const raw = parseFloat(document.getElementById('sd_raw').value);
        const mean = parseFloat(document.getElementById('sd_mean').value);
        const t = parseFloat(document.getElementById('sd_t').value);
        const res = document.getElementById('sdResult');
        
        if (isNaN(raw) || isNaN(mean) || isNaN(t)) return res.innerHTML = '<span class="error-text">입력값을 채워주세요</span>';
        if (t === 50) return res.innerHTML = '<span class="error-text">계산 불가</span>';
        
        const sd = (10 * (raw - mean)) / (t - 50);
        res.innerHTML = sd > 0 ? sd.toFixed(2) : '<span class="error-text">오류</span>';
    }

    // 부가 툴 2: 예상 점수
    function calculateExpectedScore() {
        const total = parseInt(document.getElementById('score_total').value);
        const rank = parseInt(document.getElementById('score_rank').value);
        const mean = parseFloat(document.getElementById('score_mean').value);
        const sd = parseFloat(document.getElementById('score_sd').value);
        const res = document.getElementById('scoreResult');

        if (isNaN(total) || isNaN(mean) || isNaN(sd) || isNaN(rank)) return res.innerHTML = '<span class="error-text">입력값을 채워주세요</span>';
        
        const expected = mean + (inverseNormalCDF(1 - (rank / total)) * sd);
        res.innerHTML = expected.toFixed(1) + '<span style="font-size:16px; color:var(--text-muted); margin-left:4px;">점</span>';
    }

    // 부가 툴 3: 예상 등수
    function calculateExpectedRank() {
        const total = parseInt(document.getElementById('rank_total').value);
        const score = parseFloat(document.getElementById('rank_score').value);
        const mean = parseFloat(document.getElementById('rank_mean').value);
        const sd = parseFloat(document.getElementById('rank_sd').value);
        const res = document.getElementById('rankResult');

        if (isNaN(total) || isNaN(mean) || isNaN(sd) || isNaN(score)) return res.innerHTML = '<span class="error-text">입력값을 채워주세요</span>';
        if (sd <= 0) return res.innerHTML = '<span class="error-text">표준편차는 0초과여야 합니다</span>';
        
        let rank = Math.round((1 - normalCDF((score - mean) / sd)) * total);
        res.innerHTML = (rank < 1 ? 1 : rank) + '<span style="font-size:16px; color:var(--text-muted); margin-left:4px;">등</span>';
    }

    // 최초 렌더링
    renderSubjects();
</script>
</body>
</html>
