<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기북과학고 성적 계산기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding@1.3.2/d2coding.css">
<style>
    @font-face {
        font-family: 'Gyeonggi Title';
        font-weight: 300;
        font-style: normal;
        font-display: swap;
        src: url('https://cdn.jsdelivr.net/gh/fonts-archive/GyeonggiTitle/GyeonggiTitle-Light.woff2') format('woff2'),
             url('https://cdn.jsdelivr.net/gh/fonts-archive/GyeonggiTitle/GyeonggiTitle-Light.woff') format('woff');
    }
    @font-face {
        font-family: 'Gyeonggi Title';
        font-weight: 600;
        font-style: normal;
        font-display: swap;
        src: url('https://cdn.jsdelivr.net/gh/fonts-archive/GyeonggiTitle/GyeonggiTitle-Medium.woff2') format('woff2'),
             url('https://cdn.jsdelivr.net/gh/fonts-archive/GyeonggiTitle/GyeonggiTitle-Medium.woff') format('woff');
    }
    @font-face {
        font-family: 'GyeonggiBatang';
        font-weight: 400;
        font-style: normal;
        font-display: swap;
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/GyeonggiBatang.woff') format('woff');
    }

    :root {
        /* 관측노트 팔레트 : 모눈종이 + 만년필 잉크 + 빨간 채점펜 */
        --paper: #faf9f4;
        --card: #ffffff;
        --grid-line: rgba(42, 71, 122, 0.07);
        --ink: #1c2b4a;
        --ink-soft: #626b80;
        --ink-faint: #9aa1b2;
        --pen-red: #ad3a2e;
        --pen-red-soft: rgba(173, 58, 46, 0.1);
        --highlight: #eec95f;
        --line: #dfe2e6;
        --line-strong: #c7ccd6;
        --radius: 5px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Pretendard', sans-serif;
        background-color: var(--paper);
        background-image:
            linear-gradient(var(--grid-line) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 26px 26px;
        color: var(--ink);
        line-height: 1.5;
        padding: 48px 20px 80px;
    }

    .wrap { max-width: 900px; margin: 0 auto; }

    /* ===== 헤더 : 표지 ===== */
    .masthead {
        position: relative;
        background: var(--ink);
        color: var(--paper);
        border-radius: 10px 10px 2px 2px;
        padding: 30px 34px;
        margin-bottom: 22px;
        overflow: hidden;
    }
    .masthead::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 34px;
        background: repeating-linear-gradient(
            var(--ink), var(--ink) 16px,
            rgba(255,255,255,0.12) 16px, rgba(255,255,255,0.12) 18px
        );
    }
    .masthead-inner { padding-left: 26px; }
    .eyebrow {
        font-family: 'GyeonggiBatang', serif;
        font-size: 13px;
        letter-spacing: 0.04em;
        color: #b9c2da;
        margin-bottom: 6px;
    }
    .title {
        font-family: 'Gyeonggi Title', 'Pretendard', sans-serif;
        font-weight: 600;
        font-size: 30px;
        letter-spacing: -0.01em;
    }
    .subtitle {
        font-family: 'GyeonggiBatang', serif;
        font-size: 14px;
        color: #c7cee0;
        margin-top: 6px;
    }
    .seal {
        position: absolute;
        top: 22px; right: 30px;
        width: 62px; height: 62px;
        border: 2px solid var(--pen-red);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: rotate(-9deg);
        color: var(--pen-red);
        background: rgba(173,58,46,0.06);
    }
    .seal-inner {
        text-align: center;
        font-family: 'GyeonggiBatang', serif;
        line-height: 1.2;
    }
    .seal-inner .seal-top { font-size: 9px; letter-spacing: 0.05em; }
    .seal-inner .seal-date { font-family: 'D2 coding', monospace; font-size: 10px; font-weight: 700; margin-top: 2px; }

    /* ===== 탭 : 폴더 색인 ===== */
    .tab-rail {
        display: flex;
        gap: 4px;
        overflow-x: auto;
        padding-left: 6px;
    }
    .tab-btn {
        font-family: 'Pretendard', sans-serif;
        border: 1px solid var(--line-strong);
        border-bottom: none;
        background: #eeece4;
        color: var(--ink-soft);
        font-weight: 600;
        font-size: 14px;
        padding: 11px 20px 13px;
        cursor: pointer;
        white-space: nowrap;
        clip-path: polygon(8% 0, 92% 0, 100% 100%, 0% 100%);
        transition: color 0.15s, background 0.15s;
    }
    .tab-btn:hover { color: var(--ink); background: #f4f2ea; }
    .tab-btn.active {
        background: var(--paper);
        color: var(--pen-red);
        position: relative;
        z-index: 2;
    }
    .tab-btn:focus-visible { outline: 2px solid var(--pen-red); outline-offset: 2px; }

    .sheet {
        background: var(--paper);
        border: 1px solid var(--line-strong);
        border-radius: 2px 10px 10px 10px;
        padding: 34px;
        position: relative;
        z-index: 1;
        margin-top: -1px;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
    @media (prefers-reduced-motion: no-preference) {
        .tab-content.active { animation: fadeIn 0.25s ease; }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ===== 성적 기록 카드 ===== */
    .record-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
        margin-bottom: 30px;
    }
    .record-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 66px 22px 24px;
        position: relative;
        overflow: hidden;
    }
    .record-card .stamp {
        position: absolute;
        top: 14px; right: 14px;
        width: 40px; height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'GyeonggiBatang', serif;
        font-size: 10px;
        transform: rotate(-8deg);
    }
    .record-card.official .stamp { border: 2px solid var(--pen-red); color: var(--pen-red); }
    .record-card.estimate .stamp { border: 2px dashed var(--ink-soft); color: var(--ink-soft); }
    .record-label {
        font-family: 'GyeonggiBatang', serif;
        font-size: 13px;
        color: var(--ink-soft);
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px dashed var(--line);
    }
    .record-label b { color: var(--ink); font-family: 'Pretendard', sans-serif; font-weight: 700; }
    .record-value {
        font-family: 'D2 coding', monospace;
        font-size: 38px;
        font-weight: 700;
        color: var(--ink);
    }
    .record-card.official .record-value { color: var(--pen-red); }
    .record-card.estimate .record-value { font-style: italic; }
    .record-value .unit { font-family: 'GyeonggiBatang', serif; font-size: 14px; font-weight: 400; color: var(--ink-soft); margin-left: 5px; }

    /* ===== 과목 리스트 (원장) ===== */
    .ledger { display: flex; flex-direction: column; margin-bottom: 8px; }
    .ledger-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 13px 6px;
        border-bottom: 1px dashed var(--line);
        border-left: 3px solid transparent;
        transition: border-color 0.15s, background 0.15s;
    }
    .ledger-row:hover { border-left-color: var(--pen-red); background: rgba(173,58,46,0.025); }

    .flex-group { display: flex; align-items: center; gap: 10px; }

    .field-underline {
        background: transparent;
        border: none;
        border-bottom: 1.5px solid var(--line-strong);
        border-radius: 0;
        padding: 6px 2px;
        font-size: 15px;
        font-weight: 600;
        font-family: 'Pretendard', sans-serif;
        color: var(--ink);
        outline: none;
        transition: border-color 0.15s;
    }
    .field-underline:focus { border-color: var(--pen-red); }
    .field-underline:focus-visible { outline: none; }
    .name-input { width: 108px; }
    .credit-input { width: 46px; text-align: center; font-family: 'D2 coding', monospace; }
    .unit-label { font-family: 'GyeonggiBatang', serif; font-size: 13px; color: var(--ink-faint); margin-left: -2px; }

    .grade-badge {
        appearance: none;
        -webkit-appearance: none;
        font-family: 'D2 coding', monospace;
        font-weight: 700;
        font-size: 14px;
        padding: 7px 26px 7px 14px;
        border-radius: 999px;
        border: 1.5px solid var(--pen-red);
        color: var(--pen-red);
        background-color: transparent;
        background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23ad3a2e' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 8px center;
        cursor: pointer;
        outline: none;
    }
    .grade-badge:focus-visible { outline: 2px solid var(--pen-red); outline-offset: 2px; }

    .btn-delete {
        background: none;
        border: none;
        color: var(--ink-faint);
        cursor: pointer;
        font-size: 15px;
        width: 26px; height: 26px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        transition: 0.15s;
    }
    .btn-delete:hover { color: #fff; background: var(--pen-red); }

    .btn-add {
        width: 100%;
        background: transparent;
        color: var(--ink-soft);
        border: 1.5px dashed var(--line-strong);
        padding: 15px;
        font-family: 'GyeonggiBatang', serif;
        font-size: 14px;
        border-radius: var(--radius);
        cursor: pointer;
        margin-top: 14px;
        transition: 0.15s;
    }
    .btn-add:hover { border-color: var(--pen-red); color: var(--pen-red); background: var(--pen-red-soft); }
    .btn-add:focus-visible { outline: 2px solid var(--pen-red); outline-offset: 2px; }

    /* ===== 통계 도구 ===== */
    .tool-container {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 30px;
    }
    .tool-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding-right: 26px;
        border-right: 1px dashed var(--line);
    }
    .field-block label {
        display: block;
        font-family: 'GyeonggiBatang', serif;
        font-size: 12.5px;
        color: var(--ink-soft);
        margin-bottom: 5px;
    }
    .form-control {
        width: 100%;
        padding: 9px 4px;
        border: none;
        border-bottom: 1.5px solid var(--line-strong);
        background: transparent;
        color: var(--ink);
        font-family: 'D2 coding', monospace;
        font-size: 15px;
        outline: none;
        transition: border-color 0.15s;
    }
    .form-control:focus { border-color: var(--pen-red); }

    .btn-primary {
        background: var(--ink);
        color: var(--paper);
        border: none;
        padding: 13px;
        border-radius: var(--radius);
        font-family: 'Pretendard', sans-serif;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        margin-top: 6px;
        transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--pen-red); }
    .btn-primary:focus-visible { outline: 2px solid var(--pen-red); outline-offset: 3px; }

    .tool-result-area { display: flex; flex-direction: column; }
    .curve-svg { width: 100%; height: auto; display: block; }
    .result-readout {
        margin-top: 4px;
        display: flex;
        align-items: baseline;
        gap: 10px;
    }
    .result-readout .r-label {
        font-family: 'GyeonggiBatang', serif;
        font-size: 13px;
        color: var(--ink-soft);
    }
    .result-readout .r-value {
        font-family: 'D2 coding', monospace;
        font-weight: 700;
        font-size: 26px;
        color: var(--pen-red);
    }
    .result-readout .r-value .r-unit { font-size: 14px; color: var(--ink-soft); font-family: 'GyeonggiBatang', serif; margin-left: 3px; }
    .error-text { color: var(--pen-red); font-size: 14px; font-weight: 600; font-family: 'Pretendard', sans-serif; }

    @media (max-width: 640px) {
        .ledger-row { flex-direction: column; align-items: stretch; gap: 12px; }
        .flex-group { justify-content: space-between; }
        .name-input { flex: 1; }
        .tool-container { grid-template-columns: 1fr; }
        .tool-form { border-right: none; padding-right: 0; border-bottom: 1px dashed var(--line); padding-bottom: 22px; }
        .masthead-inner { padding-left: 18px; }
        .seal { width: 52px; height: 52px; top: 16px; right: 18px; }
    }
</style>
</head>
<body>

<div class="wrap">

    <div class="masthead">
        <div class="masthead-inner">
            <p class="eyebrow">경기북과학고 전용</p>
            <h1 class="title">성적 계산기</h1>
            <p class="subtitle">made by karina</p>
        </div>
        <div class="seal">
            <div class="seal-inner">
                <div class="seal-top">기록일</div>
                <div class="seal-date" id="sealDate">--.--.--</div>
            </div>
        </div>
    </div>

    <nav class="tab-rail">
        <button class="tab-btn active" onclick="switchTab('tab-1', this)">성적 관리</button>
        <button class="tab-btn" onclick="switchTab('tab-2', this)">표준편차 역산</button>
        <button class="tab-btn" onclick="switchTab('tab-3', this)">목표 점수</button>
        <button class="tab-btn" onclick="switchTab('tab-4', this)">예상 등수</button>
    </nav>

    <main class="sheet">

        <div id="tab-1" class="tab-content active">
            <div class="record-grid">
                <div class="record-card official">
                    <div class="stamp">확정</div>
                    <div class="record-label">5등급제 평균 &nbsp;<b>총 <span id="total-credits">0</span>단위</b></div>
                    <div class="record-value" id="grade-5">0.00<span class="unit">등급</span></div>
                </div>
                <div class="record-card estimate">
                    <div class="stamp">추정</div>
                    <div class="record-label">9등급제 환산 추정치 &nbsp;<b>교육청 통계 기반</b></div>
                    <div class="record-value" id="grade-9">0.00<span class="unit">등급</span></div>
                </div>
            </div>

            <div class="ledger" id="subjectList"></div>

            <button class="btn-add" onclick="addSubject()">✎ 과목 추가하기</button>
        </div>

        <div id="tab-2" class="tab-content">
            <div class="tool-container">
                <div class="tool-form">
                    <div class="field-block"><label>내 원점수</label><input type="number" id="sd_raw" class="form-control"></div>
                    <div class="field-block"><label>과목 평균</label><input type="number" id="sd_mean" class="form-control"></div>
                    <div class="field-block"><label>T점수 (표준점수)</label><input type="number" id="sd_t" class="form-control"></div>
                    <button class="btn-primary" onclick="calculateSD()">계산하기</button>
                </div>
                <div class="tool-result-area">
                    <div id="sdCurve"></div>
                    <div class="result-readout">
                        <span class="r-label">예측된 표준편차</span>
                        <span class="r-value" id="sdResult">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-3" class="tab-content">
            <div class="tool-container">
                <div class="tool-form">
                    <div class="field-block"><label>학년 총 인원</label><input type="number" id="score_total" class="form-control" value="97"></div>
                    <div class="field-block"><label>목표 등수</label><input type="number" id="score_rank" class="form-control"></div>
                    <div class="field-block"><label>과목 평균</label><input type="number" id="score_mean" class="form-control"></div>
                    <div class="field-block"><label>표준편차</label><input type="number" id="score_sd" class="form-control"></div>
                    <button class="btn-primary" onclick="calculateExpectedScore()">계산하기</button>
                </div>
                <div class="tool-result-area">
                    <div id="scoreCurve"></div>
                    <div class="result-readout">
                        <span class="r-label">필요한 원점수</span>
                        <span class="r-value" id="scoreResult">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-4" class="tab-content">
            <div class="tool-container">
                <div class="tool-form">
                    <div class="field-block"><label>학년 총 인원</label><input type="number" id="rank_total" class="form-control" value="97"></div>
                    <div class="field-block"><label>내 원점수</label><input type="number" id="rank_score" class="form-control"></div>
                    <div class="field-block"><label>과목 평균</label><input type="number" id="rank_mean" class="form-control"></div>
                    <div class="field-block"><label>표준편차</label><input type="number" id="rank_sd" class="form-control"></div>
                    <button class="btn-primary" onclick="calculateExpectedRank()">계산하기</button>
                </div>
                <div class="tool-result-area">
                    <div id="rankCurve"></div>
                    <div class="result-readout">
                        <span class="r-label">나의 예상 위치</span>
                        <span class="r-value" id="rankResult">-</span>
                    </div>
                </div>
            </div>
        </div>

    </main>
</div>

<script>
    // 탭 전환
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    // 오늘 날짜 스탬프
    (function stampDate() {
        function pad2(n) { n = String(n); return n.length < 2 ? '0' + n : n; }
        const d = new Date();
        const y = String(d.getFullYear()).slice(2);
        const m = pad2(d.getMonth() + 1);
        const day = pad2(d.getDate());
        document.getElementById('sealDate').textContent = y + '.' + m + '.' + day;
    })();

    // 통계 함수
    function normalCDF(z) {
        let t = 1 / (1 + 0.2316419 * Math.abs(z));
        let d = 0.3989423 * Math.exp(-z * z / 2);
        let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
        return z > 0 ? 1 - p : p;
    }

    function inverseNormalCDF(p) {
        if (p <= 0) return -4; if (p >= 1) return 4;
        let sign = (p < 0.5) ? -1 : 1;
        p = (p < 0.5) ? p : 1 - p;
        let t = Math.sqrt(-2.0 * Math.log(p));
        let num = 2.515517 + t * (0.802853 + t * 0.010328);
        let den = 1.0 + t * (1.432788 + t * (0.189269 + t * 0.001308));
        return sign * (t - num / den);
    }

    function pdf(z) { return Math.exp(-z * z / 2) / Math.sqrt(2 * Math.PI); }

    // ===== 정규분포 곡선 렌더러 (관측노트 시그니처) =====
    const CURVE_W = 380, CURVE_H = 180, BASE_Y = 148, TOP_PAD = 18, X0 = 20, X1 = 360;

    function curvePoints(steps) {
        steps = steps || 70;
        const pts = [];
        for (let i = 0; i <= steps; i++) {
            const z = -3.5 + (7 * i / steps);
            pts.push({ z: z, p: pdf(z) });
        }
        return pts;
    }
    function zx(z) { return X0 + (z + 3.5) / 7 * (X1 - X0); }
    function py(p) { const maxP = pdf(0); return BASE_Y - (p / maxP) * (BASE_Y - TOP_PAD); }

    function buildCurvePath(pts) {
        return pts.map((pt, i) => (i === 0 ? 'M' : 'L') + ' ' + zx(pt.z).toFixed(1) + ' ' + py(pt.p).toFixed(1)).join(' ');
    }
    function buildShadePath(pts, fromZ, dir) {
        const sub = dir === 'left' ? pts.filter(pt => pt.z <= fromZ) : pts.filter(pt => pt.z >= fromZ);
        if (sub.length < 2) return '';
        let d = 'M ' + zx(sub[0].z).toFixed(1) + ' ' + BASE_Y + ' ';
        sub.forEach(pt => { d += 'L ' + zx(pt.z).toFixed(1) + ' ' + py(pt.p).toFixed(1) + ' '; });
        d += 'L ' + zx(sub[sub.length - 1].z).toFixed(1) + ' ' + BASE_Y + ' Z';
        return d;
    }

    function renderCurve(containerId, opts) {
        opts = opts || {};
        const pts = curvePoints();
        const curveD = buildCurvePath(pts);
        const clampZ = z => Math.max(-3.5, Math.min(3.5, z));

        let shadeSvg = '';
        if (opts.shadeFromZ !== undefined) {
            const shadeD = buildShadePath(pts, clampZ(opts.shadeFromZ), opts.shadeDir || 'right');
            shadeSvg = '<path d="' + shadeD + '" fill="var(--pen-red)" fill-opacity="0.13"></path>';
        }

        let markerSvg = '';
        if (opts.markerZ !== undefined) {
            const mz = clampZ(opts.markerZ);
            const mx = zx(mz), my = py(pdf(mz));
            markerSvg =
                '<line x1="' + mx + '" y1="' + BASE_Y + '" x2="' + mx + '" y2="' + my + '" stroke="var(--pen-red)" stroke-width="1.5" stroke-dasharray="3 3"/>' +
                '<circle cx="' + mx + '" cy="' + my + '" r="4.5" fill="var(--pen-red)" stroke="#fff" stroke-width="1.5"/>';
        }

        const meanSvg = '<line x1="' + zx(0) + '" y1="' + BASE_Y + '" x2="' + zx(0) + '" y2="' + py(pdf(0)) + '" stroke="var(--ink)" stroke-width="1" stroke-dasharray="2 4" opacity="0.55"/>';

        let ticks = '';
        [-3, -2, -1, 0, 1, 2, 3].forEach(s => {
            const x = zx(s);
            const label = s === 0 ? '평균' : (s > 0 ? '+' + s + 'σ' : s + 'σ');
            ticks += '<line x1="' + x + '" y1="' + BASE_Y + '" x2="' + x + '" y2="' + (BASE_Y + 5) + '" stroke="var(--ink-faint)" stroke-width="1"/>';
            ticks += '<text x="' + x + '" y="' + (BASE_Y + 17) + '" font-size="9.5" fill="var(--ink-faint)" text-anchor="middle" font-family="D2 coding, monospace">' + label + '</text>';
        });

        const svg =
            '<svg viewBox="0 0 ' + CURVE_W + ' ' + CURVE_H + '" class="curve-svg" role="img" aria-label="정규분포 곡선">' +
            '<line x1="' + X0 + '" y1="' + BASE_Y + '" x2="' + X1 + '" y2="' + BASE_Y + '" stroke="var(--line-strong)" stroke-width="1"/>' +
            shadeSvg +
            '<path d="' + curveD + '" fill="none" stroke="var(--ink)" stroke-width="2"/>' +
            meanSvg + markerSvg + ticks +
            '</svg>';

        const el = document.getElementById(containerId);
        if (el) el.innerHTML = svg;
    }

    // 과목 데이터 (기본 9과목 세팅 유지)
    let subjectsData = [
        { id: 1, name: '수학', credit: 6, grade: 1 },
        { id: 2, name: '물리', credit: 3, grade: 1 },
        { id: 3, name: '화학', credit: 2, grade: 1 },
        { id: 4, name: '생명', credit: 3, grade: 1 },
        { id: 5, name: '지학', credit: 3, grade: 1 },
        { id: 6, name: '정보', credit: 2, grade: 1 },
        { id: 7, name: '영어', credit: 3, grade: 1 },
        { id: 8, name: '중국어', credit: 3, grade: 1 },
        { id: 9, name: '한국사', credit: 3, grade: 1 }
    ];

    // 부산교육청 9등급제 추정
    function estimate9TierGrade(grade5) {
        const map = [
            {g5: 1.00, g9: 1.64}, {g5: 1.16, g9: 1.81}, {g5: 1.33, g9: 2.18}, {g5: 1.50, g9: 2.48},
            {g5: 1.66, g9: 2.76}, {g5: 1.83, g9: 3.07}, {g5: 2.00, g9: 3.44}, {g5: 2.16, g9: 3.61},
            {g5: 2.33, g9: 3.94}, {g5: 2.50, g9: 4.22}, {g5: 2.66, g9: 4.47}, {g5: 2.83, g9: 4.76},
            {g5: 3.00, g9: 5.08}, {g5: 3.16, g9: 5.25}, {g5: 3.33, g9: 5.55}, {g5: 3.50, g9: 5.83},
            {g5: 3.66, g9: 6.05}, {g5: 3.83, g9: 6.35}, {g5: 4.00, g9: 6.69}, {g5: 4.16, g9: 6.84},
            {g5: 4.33, g9: 7.14}, {g5: 4.50, g9: 7.40}, {g5: 4.66, g9: 7.63}, {g5: 4.83, g9: 7.97}, {g5: 5.00, g9: 9.00}
        ];
        if (grade5 <= 1.00) return 1.64; if (grade5 >= 5.00) return 9.00;
        for (let i=0; i<map.length-1; i++) {
            if (grade5 >= map[i].g5 && grade5 <= map[i+1].g5) {
                let r = (grade5 - map[i].g5) / (map[i+1].g5 - map[i].g5);
                return map[i].g9 + r * (map[i+1].g9 - map[i].g9);
            }
        }
        return 9.00;
    }

    // 실시간 성적 계산
    function calculateRealTime() {
        let sumScore = 0, sumCredit = 0;
        subjectsData.forEach(sub => { sumScore += sub.grade * sub.credit; sumCredit += sub.credit; });
        document.getElementById('total-credits').innerText = sumCredit;

        if(sumCredit === 0) {
            document.getElementById('grade-5').innerHTML = '0.00<span class="unit">등급</span>';
            document.getElementById('grade-9').innerHTML = '0.00<span class="unit">등급</span>';
            return;
        }
        const avg = sumScore / sumCredit;
        document.getElementById('grade-5').innerHTML = avg.toFixed(2) + '<span class="unit">등급</span>';
        document.getElementById('grade-9').innerHTML = estimate9TierGrade(avg).toFixed(2) + '<span class="unit">등급</span>';
    }

    // 리스트형으로 과목 UI 렌더링
    function renderSubjects() {
        const container = document.getElementById('subjectList');
        container.innerHTML = '';

        subjectsData.forEach((sub, i) => {
            let options = [1,2,3,4,5].map(v => `<option value="${v}" ${sub.grade == v ? 'selected' : ''}>${v}등급</option>`).join('');

            const row = document.createElement('div');
            row.className = 'ledger-row';
            row.innerHTML = `
                <div class="flex-group">
                    <input type="text" class="field-underline name-input" value="${sub.name}" oninput="updateData(${i}, 'name', this.value)" placeholder="과목명">
                    <input type="number" class="field-underline credit-input" value="${sub.credit}" min="1" oninput="updateData(${i}, 'credit', this.value)">
                    <span class="unit-label">단위</span>
                </div>
                <div class="flex-group">
                    <select class="grade-badge" onchange="updateData(${i}, 'grade', this.value)">
                        ${options}
                    </select>
                    <button class="btn-delete" onclick="deleteSubject(${i})" title="삭제">✕</button>
                </div>
            `;
            container.appendChild(row);
        });

        calculateRealTime();
    }

    // 데이터 갱신
    function updateData(index, field, value) {
        if (field === 'credit' || field === 'grade') {
            subjectsData[index][field] = parseInt(value) || 0;
        } else {
            subjectsData[index][field] = value;
        }
        calculateRealTime();
    }

    function addSubject() { subjectsData.push({ id: Date.now(), name: '새 과목', credit: 3, grade: 1 }); renderSubjects(); }
    function deleteSubject(index) { subjectsData.splice(index, 1); renderSubjects(); }

    // 부가 툴 1: 표준편차 역산
    function calculateSD() {
        const raw = parseFloat(document.getElementById('sd_raw').value);
        const mean = parseFloat(document.getElementById('sd_mean').value);
        const t = parseFloat(document.getElementById('sd_t').value);
        const res = document.getElementById('sdResult');

        if (isNaN(raw) || isNaN(mean) || isNaN(t)) {
            res.innerHTML = '<span class="error-text">입력값을 채워주세요</span>';
            renderCurve('sdCurve', {});
            return;
        }
        if (t === 50) {
            res.innerHTML = '<span class="error-text">계산 불가</span>';
            renderCurve('sdCurve', {});
            return;
        }

        const sd = (10 * (raw - mean)) / (t - 50);
        if (sd > 0) {
            res.innerHTML = sd.toFixed(2);
            renderCurve('sdCurve', { markerZ: (t - 50) / 10 });
        } else {
            res.innerHTML = '<span class="error-text">오류</span>';
            renderCurve('sdCurve', {});
        }
    }

    // 부가 툴 2: 예상 점수
    function calculateExpectedScore() {
        const total = parseInt(document.getElementById('score_total').value);
        const rank = parseInt(document.getElementById('score_rank').value);
        const mean = parseFloat(document.getElementById('score_mean').value);
        const sd = parseFloat(document.getElementById('score_sd').value);
        const res = document.getElementById('scoreResult');

        if (isNaN(total) || isNaN(mean) || isNaN(sd) || isNaN(rank)) {
            res.innerHTML = '<span class="error-text">입력값을 채워주세요</span>';
            renderCurve('scoreCurve', {});
            return;
        }

        const z = inverseNormalCDF(1 - (rank / total));
        const expected = mean + (z * sd);
        res.innerHTML = expected.toFixed(1) + '<span class="r-unit">점</span>';
        renderCurve('scoreCurve', { markerZ: z, shadeFromZ: z, shadeDir: 'right' });
    }

    // 부가 툴 3: 예상 등수
    function calculateExpectedRank() {
        const total = parseInt(document.getElementById('rank_total').value);
        const score = parseFloat(document.getElementById('rank_score').value);
        const mean = parseFloat(document.getElementById('rank_mean').value);
        const sd = parseFloat(document.getElementById('rank_sd').value);
        const res = document.getElementById('rankResult');

        if (isNaN(total) || isNaN(mean) || isNaN(sd) || isNaN(score)) {
            res.innerHTML = '<span class="error-text">입력값을 채워주세요</span>';
            renderCurve('rankCurve', {});
            return;
        }
        if (sd <= 0) {
            res.innerHTML = '<span class="error-text">표준편차는 0초과여야 합니다</span>';
            renderCurve('rankCurve', {});
            return;
        }

        const z = (score - mean) / sd;
        let rank = Math.round((1 - normalCDF(z)) * total);
        rank = rank < 1 ? 1 : rank;
        res.innerHTML = rank + '<span class="r-unit">등</span>';
        renderCurve('rankCurve', { markerZ: z, shadeFromZ: z, shadeDir: 'right' });
    }

    // 최초 렌더링
    renderSubjects();
    renderCurve('sdCurve', {});
    renderCurve('scoreCurve', {});
    renderCurve('rankCurve', {});
</script>
