<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Master | 프리미엄 성적 분석</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0f19;
            --surface: rgba(20, 25, 35, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --surface-hover: rgba(255, 255, 255, 0.05);
            
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.3);
            --purple: #8b5cf6;
            
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 50%, rgba(59, 130, 246, 0.08), transparent 50%),
                radial-gradient(circle at 90% 20%, rgba(139, 92, 246, 0.08), transparent 50%);
            background-attachment: fixed;
        }

        .panel {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
        }

        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 32px 24px;
            border-right: 1px solid var(--surface-border);
            display: flex;
            flex-direction: column;
            gap: 40px;
            background: rgba(11, 15, 25, 0.5);
            backdrop-filter: blur(20px);
            z-index: 50;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-left: 8px;
        }

        .nav-menu { display: flex; flex-direction: column; gap: 8px; }

        .nav-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px; border-radius: 12px;
            color: var(--text-sub); font-weight: 600; font-size: 15px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .nav-item:hover { background: var(--surface-hover); color: var(--text-main); }
        .nav-item.active {
            background: rgba(59, 130, 246, 0.1); color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        .main-content {
            padding: 48px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .tab-pane { display: none; animation: fadeIn 0.3s ease-out; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

        .hero-dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        .stat-card {
            padding: 32px;
            display: flex; flex-direction: column; justify-content: center;
            position: relative; overflow: hidden;
        }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; }
        .stat-card.blue::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .stat-card.purple::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        
        .stat-label { font-size: 14px; color: var(--text-sub); font-weight: 600; margin-bottom: 12px; }
        .stat-value { font-size: 44px; font-weight: 800; color: var(--text-main); display: flex; align-items: baseline; gap: 6px; }
        .stat-unit { font-size: 18px; color: var(--text-sub); font-weight: 600; }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
            margin-bottom: 40px;
        }

        .subject-card {
            padding: 24px;
            transition: transform 0.2s;
        }
        .subject-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-body { display: flex; flex-direction: column; gap: 16px; }

        .subject-name-input {
            background: transparent; border: none; border-bottom: 1px solid transparent;
            color: var(--text-main); font-size: 18px; font-weight: 700; width: 70%; outline: none; padding-bottom: 4px;
        }
        .subject-name-input:focus { border-bottom: 1px solid var(--primary); }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 13px; color: var(--text-sub); font-weight: 600; }
        
        .form-input {
            width: 100%; background: rgba(0, 0, 0, 0.25); border: 1px solid var(--surface-border);
            color: var(--text-main); padding: 14px 16px; border-radius: 12px; font-size: 15px; font-weight: 600;
            outline: none; transition: all 0.2s;
        }
        .form-input:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        
        select.form-input {
            appearance: none; cursor: pointer;
            background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9L12 15L18 9' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat; background-position: right 12px center;
        }
        select.form-input option { background: var(--bg-base); }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none;
            width: 28px; height: 28px; border-radius: 8px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-delete:hover { background: var(--danger); color: white; }

        .btn-add {
            background: transparent; border: 1px dashed var(--surface-border); color: var(--text-sub);
            border-radius: 20px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; min-height: 220px;
        }
        .btn-add:hover { border-color: var(--primary); color: var(--primary); background: rgba(59, 130, 246, 0.05); }

        .tool-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 900px; }
        .tool-form { padding: 32px; display: flex; flex-direction: column; gap: 20px; }
        .tool-result {
            padding: 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.1);
        }
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .btn-action {
            background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; width: 100%;
        }
        .btn-action:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 15px var(--primary-glow); }

        @media (max-width: 1200px) {
            .subject-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 900px) {
            body { grid-template-columns: 1fr; }
            .sidebar {
                position: fixed; bottom: 0; top: auto; height: 70px; width: 100%; padding: 0 16px;
                flex-direction: row; border-right: none; border-top: 1px solid var(--surface-border); z-index: 9999;
            }
            .brand { display: none; }
            .nav-menu { flex-direction: row; width: 100%; justify-content: space-around; align-items: center; }
            .nav-item { flex-direction: column; gap: 4px; padding: 10px; font-size: 11px; }
            .nav-item.active { background: transparent; border: none; color: var(--primary); }
            
            .main-content { padding: 24px 20px 100px 20px; }
            .hero-dashboard { grid-template-columns: 1fr; }
            .subject-grid { grid-template-columns: 1fr; }
            .tool-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand">Grade Master</div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="switchTab('tab-1', this)"><span>📊</span><span>성적 관리</span></div>
            <div class="nav-item" onclick="switchTab('tab-2', this)"><span>📈</span><span>표준편차</span></div>
            <div class="nav-item" onclick="switchTab('tab-3', this)"><span>🎯</span><span>목표 점수</span></div>
            <div class="nav-item" onclick="switchTab('tab-4', this)"><span>🏆</span><span>예상 등수</span></div>
        </div>
    </nav>

    <main class="main-content">
        
        <div id="tab-1" class="tab-pane active">
            <div class="hero-dashboard">
                <div class="stat-card panel blue">
                    <div class="stat-label">5등급제 평균 (총 <span id="total-credits">0</span>단위)</div>
                    <div class="stat-value"><span id="grade-5">0.00</span><span class="stat-unit">등급</span></div>
                </div>
                <div class="stat-card panel purple">
                    <div class="stat-label">9등급제 환산 추정치</div>
                    <div class="stat-value"><span id="grade-9">0.00</span><span class="stat-unit">등급</span></div>
                </div>
            </div>

            <h2 class="section-title">과목 리스트</h2>
            <div class="subject-grid" id="subject-grid">
                </div>
        </div>

        <div id="tab-2" class="tab-pane">
            <h2 class="section-title">표준편차 역산</h2>
            <div class="tool-layout">
                <div class="tool-form panel">
                    <div class="tool-grid">
                        <div class="input-group"><label>내 원점수</label><input type="number" id="sd_raw" class="form-input"></div>
                        <div class="input-group"><label>과목 평균</label><input type="number" id="sd_mean" class="form-input"></div>
                    </div>
                    <div class="input-group"><label>T점수 (표준점수)</label><input type="number" id="sd_t" class="form-input"></div>
                    <button class="btn-action" onclick="calculateSD()">계산하기</button>
                </div>
                <div class="tool-result panel">
                    <div class="stat-label">예측된 과목 표준편차</div>
                    <div class="stat-value" id="sdResult" style="color: var(--primary); margin-top:10px;">-</div>
                </div>
            </div>
        </div>

        <div id="tab-3" class="tab-pane">
            <h2 class="section-title">목표 커트라인 예측</h2>
            <div class="tool-layout">
                <div class="tool-form panel">
                    <div class="tool-grid">
                        <div class="input-group"><label>학년 총 인원</label><input type="number" id="score_total" class="form-input" value="100"></div>
                        <div class="input-group"><label>목표 등수</label><input type="number" id="score_rank" class="form-input"></div>
                        <div class="input-group"><label>과목 평균</label><input type="number" id="score_mean" class="form-input"></div>
                        <div class="input-group"><label>표준편차</label><input type="number" id="score_sd" class="form-input"></div>
                    </div>
                    <button class="btn-action" onclick="calculateExpectedScore()">계산하기</button>
                </div>
                <div class="tool-result panel">
                    <div class="stat-label">필요한 원점수</div>
                    <div class="stat-value" id="scoreResult" style="color: var(--primary); margin-top:10px;">-</div>
                </div>
            </div>
        </div>

        <div id="tab-4" class="tab-pane">
            <h2 class="section-title">내 예상 등수</h2>
            <div class="tool-layout">
                <div class="tool-form panel">
                    <div class="tool-grid">
                        <div class="input-group"><label>학년 총 인원</label><input type="number" id="rank_total" class="form-input" value="100"></div>
                        <div class="input-group"><label>내 원점수</label><input type="number" id="rank_score" class="form-input"></div>
                        <div class="input-group"><label>과목 평균</label><input type="number" id="rank_mean" class="form-input"></div>
                        <div class="input-group"><label>표준편차</label><input type="number" id="rank_sd" class="form-input"></div>
                    </div>
                    <button class="btn-action" onclick="calculateExpectedRank()">계산하기</button>
                </div>
                <div class="tool-result panel">
                    <div class="stat-label">나의 예상 위치</div>
                    <div class="stat-value" id="rankResult" style="color: var(--primary); margin-top:10px;">-</div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function normalCDF(z) {
            let t = 1 / (1 + 0.2316419 * Math.abs(z));
            let d = 0.3989423 * Math.exp(-z * z / 2);
            let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
            return z > 0 ? 1 - p : p;
        }

        function inverseNormalCDF(p) {
            if (p <= 0) return -4; if (p >= 1) return 4;
            let sign = (p < 0.5) ? -1 : 1;
            p = (p < 0.5) ? p : 1 - p;
            let t = Math.sqrt(-2.0 * Math.log(p));
            let num = 2.515517 + t * (0.802853 + t * 0.010328);
            let den = 1.0 + t * (1.432788 + t * (0.189269 + t * 0.001308));
            return sign * (t - num / den);
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-pane').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        // 요청하신 정확한 과목명과 시수로 세팅
        let subjectsData = [
            { id: 1, name: '수학', credit: 3, grade: 1 },
            { id: 2, name: '물리', credit: 3, grade: 1 },
            { id: 3, name: '화학', credit: 2, grade: 1 },
            { id: 4, name: '생명', credit: 3, grade: 1 },
            { id: 5, name: '지학', credit: 3, grade: 1 },
            { id: 6, name: '정보', credit: 2, grade: 1 },
            { id: 7, name: '영어', credit: 3, grade: 1 },
            { id: 8, name: '중국어', credit: 3, grade: 1 },
            { id: 9, name: '한국사', credit: 3, grade: 1 }
        ];

        function estimate9TierGrade(grade5) {
            const map = [
                {g5: 1.00, g9: 1.64}, {g5: 1.16, g9: 1.81}, {g5: 1.33, g9: 2.18}, {g5: 1.50, g9: 2.48}, 
                {g5: 1.66, g9: 2.76}, {g5: 1.83, g9: 3.07}, {g5: 2.00, g9: 3.44}, {g5: 2.16, g9: 3.61}, 
                {g5: 2.33, g9: 3.94}, {g5: 2.50, g9: 4.22}, {g5: 2.66, g9: 4.47}, {g5: 2.83, g9: 4.76},
                {g5: 3.00, g9: 5.08}, {g5: 3.16, g9: 5.25}, {g5: 3.33, g9: 5.55}, {g5: 3.50, g9: 5.83}, 
                {g5: 3.66, g9: 6.05}, {g5: 3.83, g9: 6.35}, {g5: 4.00, g9: 6.69}, {g5: 4.16, g9: 6.84}, 
                {g5: 4.33, g9: 7.14}, {g5: 4.50, g9: 7.40}, {g5: 4.66, g9: 7.63}, {g5: 4.83, g9: 7.97}, {g5: 5.00, g9: 9.00}
            ];
            if (grade5 <= 1.00) return 1.64; if (grade5 >= 5.00) return 9.00;
            for (let i=0; i<map.length-1; i++) {
                if (grade5 >= map[i].g5 && grade5 <= map[i+1].g5) {
                    let r = (grade5 - map[i].g5) / (map[i+1].g5 - map[i].g5);
                    return map[i].g9 + r * (map[i+1].g9 - map[i].g9);
                }
            }
            return 9.00;
        }

        function calculateRealTime() {
            let sumScore = 0, sumCredit = 0;
            subjectsData.forEach(sub => { sumScore += sub.grade * sub.credit; sumCredit += sub.credit; });
            document.getElementById('total-credits').innerText = sumCredit;
            
            if(sumCredit === 0) {
                document.getElementById('grade-5').innerText = '-';
                document.getElementById('grade-9').innerText = '-';
                return;
            }
            const avg = sumScore / sumCredit;
            document.getElementById('grade-5').innerText = avg.toFixed(2);
            document.getElementById('grade-9').innerText = estimate9TierGrade(avg).toFixed(2);
        }

        function renderSubjects() {
            const container = document.getElementById('subject-grid');
            container.innerHTML = '';
            
            subjectsData.forEach((sub, i) => {
                let options = [1,2,3,4,5].map(v => `<option value="${v}" ${sub.grade == v ? 'selected' : ''}>${v}등급</option>`).join('');
                
                const card = document.createElement('div');
                card.className = 'subject-card panel';
                card.innerHTML = `
                    <div class="card-header">
                        <input type="text" class="subject-name-input" value="${sub.name}" oninput="updateData(${i}, 'name', this.value)">
                        <button class="btn-delete" onclick="deleteSubject(${i})" title="삭제">✕</button>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <label>이수 단위</label>
                            <input type="number" class="form-input" value="${sub.credit}" min="1" oninput="updateData(${i}, 'credit', this.value)">
                        </div>
                        <div class="input-group">
                            <label>성적 (5등급제)</label>
                            <select class="form-input" onchange="updateData(${i}, 'grade', this.value)">
                                ${options}
                            </select>
                        </div>
                    </div>`;
                container.appendChild(card);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'btn-add';
            addBtn.innerHTML = '+ 새 과목 추가';
            addBtn.onclick = addSubject;
            container.appendChild(addBtn);

            calculateRealTime();
        }

        function updateData(index, field, value) {
            if (field === 'credit' || field === 'grade') {
                subjectsData[index][field] = parseInt(value) || 0;
            } else {
                subjectsData[index][field] = value;
            }
            calculateRealTime();
        }

        function addSubject() { 
            subjectsData.push({ id: Date.now(), name: '', credit: 3, grade: 1 }); 
            renderSubjects(); 
        }
        function deleteSubject(index) { 
            subjectsData.splice(index, 1); 
            renderSubjects(); 
        }

        function calculateSD() {
            const raw = parseFloat(document.getElementById('sd_raw').value);
            const mean = parseFloat(document.getElementById('sd_mean').value);
            const t = parseFloat(document.getElementById('sd_t').value);
            const res = document.getElementById('sdResult');
            if (isNaN(raw) || isNaN(mean) || isNaN(t)) return res.innerHTML = '-';
            if (t === 50) return res.innerHTML = '<span style="color:var(--danger); font-size:20px;">계산 불가</span>';
            const sd = (10 * (raw - mean)) / (t - 50);
            res.innerHTML = sd > 0 ? sd.toFixed(2) : '<span style="color:var(--danger); font-size:20px;">오류</span>';
        }

        function calculateExpectedScore() {
            const total = parseInt(document.getElementById('score_total').value);
            const rank = parseInt(document.getElementById('score_rank').value);
            const mean = parseFloat(document.getElementById('score_mean').value);
            const sd = parseFloat(document.getElementById('score_sd').value);
            const res = document.getElementById('scoreResult');
            if (isNaN(total) || isNaN(mean) || isNaN(sd) || isNaN(rank)) return res.innerHTML = '-';
            const expected = mean + (inverseNormalCDF(1 - (rank / total)) * sd);
            res.innerHTML = expected.toFixed(1) + '<span class="stat-unit"> 점</span>';
        }

        function calculateExpectedRank() {
            const total = parseInt(document.getElementById('rank_total').value);
            const score = parseFloat(document.getElementById('rank_score').value);
            const mean = parseFloat(document.getElementById('rank_mean').value);
            const sd = parseFloat(document.getElementById('rank_sd').value);
            const res = document.getElementById('rankResult');
            if (isNaN(total) || isNaN(mean) || isNaN(sd) || isNaN(score) || sd <= 0) return res.innerHTML = '-';
            let rank = Math.round((1 - normalCDF((score - mean) / sd)) * total);
            res.innerHTML = (rank < 1 ? 1 : rank) + '<span class="stat-unit"> 등</span>';
        }

        // 초기 실행
        renderSubjects();
    </script>
</body>
</html>
